<!doctype html>
<html>
    <head>
        <title>{{ site_name }} - 登录</title>
        <link
            rel="stylesheet"
            href="{{ url_for('static', filename='css/style.css', v=static_version) }}"
        />
        <link
            rel="stylesheet"
            href="{{ url_for('static', filename='css/login.css', v=static_version) }}"
        />
    </head>

    <body>
        <div class="container">
            <h2>登录</h2>
            <div
                id="error-message"
                class="error-message"
                style="display: none"
            ></div>
            <form id="login-form" onsubmit="return handleLogin(event);">
                <div class="form-group">
                    <label for="username">用户名:</label>
                    <input type="text" id="username" name="username" required />
                </div>
                <div class="form-group">
                    <label for="password">密码:</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        required
                    />
                </div>
                <div class="form-group checkbox-group">
                    <input type="checkbox" id="remember" name="remember" />
                    <label for="remember">30天内免登录</label>
                </div>
                <button type="submit">登录</button>
            </form>
            <p>还没有账户？<a href="/register">注册</a></p>
            <p class="app-version-text">版本 v{{ app_version }}</p>
        </div>

        <script src="{{ url_for('static', filename='js/utils.js', v=static_version) }}"></script>
        <script src="{{ url_for('static', filename='js/login.js', v=static_version) }}"></script>
    </body>
</html>
